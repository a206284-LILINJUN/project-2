# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
kotlin.code.style=official
android.disallowKotlinSourceSets=false

# Fix for "Unhandled default value type class ksp.com.intellij.psi.impl.compiled.ClsParameterImpl"
# Disables the experimental KSP2 backend and reverts to the stable KSP1 backend.
ksp.useKSP2=false

# Fix for "Cannot query the value of property 'testedVariantArtifacts$kotlin_gradle_plugin_common'"
# Required for KSP1 compatibility with newer Kotlin 2.1.0+ and AGP versions.
ksp.allow.all.target.configuration=true
android.useAndroidX=true
android.enableJetifier=true